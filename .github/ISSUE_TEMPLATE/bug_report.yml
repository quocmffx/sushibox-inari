name: Bug report
description: Report a problem with SushiBox Inari beta
title: "[Bug]: "
labels: [bug, beta]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Inari. Please include enough detail so the issue can
        be reproduced on a clean Windows machine.

  - type: input
    id: version
    attributes:
      label: Inari version
      description: Example: v0.1.0-beta.3
      placeholder: v0.1.0-beta.x
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows version
      description: Example: Windows 11 23H2, Windows Server 2022
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: input
    id: install-path
    attributes:
      label: Portable folder path
      description: Where did you unzip/run Inari from? Avoid sharing private usernames if needed.
      placeholder: D:\Tools\SushiBox-Inari-Portable
    validations:
      required: false

  - type: dropdown
    id: service
    attributes:
      label: Affected service
      multiple: true
      options:
        - Panel / GUI
        - nginx / web
        - PHP-CGI
        - MariaDB
        - Redis
        - Packaging / zip
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you click or run?
      placeholder: |
        1. Open Inari.exe
        2. Click Start all
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead? Include exact error text if shown.
    validations:
      required: true

  - type: textarea
    id: ports
    attributes:
      label: Port settings
      description: Include any custom port changes from Settings.
      value: |
        Panel: 1788
        Web/nginx: 8080
        MariaDB: 3307
        Redis: 6380
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Attach screenshots or paste relevant lines from the logs folder. Do not paste secrets.
      placeholder: Paste log snippets here, or drag-and-drop screenshots.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I am using an official portable beta zip or a local build from this repository.
          required: true
        - label: I did not paste passwords, tokens, private keys, or production database dumps.
          required: true
